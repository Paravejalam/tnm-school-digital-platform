# =============================================================================
# T.N. Memorial Public School Digital Platform
# nginx/nginx.conf — Nginx Reverse Proxy Configuration
# Authority: .github/AGENT.md (Section 4.1 — Docker Governance)
#
# Responsibilities:
#   - Serve PHP backend via PHP-FPM on /api
#   - Proxy Next.js website on port 3000
#   - Proxy Next.js ERP on port 3001
#   - Enforce security headers (AGENT.md Section 24.11)
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Core settings
    # -------------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Upload size
    # -------------------------------------------------------------------------
    client_max_body_size 64M;

    # =========================================================================
    # Main server block — port 80
    # Handles: PHP API, Website proxy, ERP proxy, phpMyAdmin proxy
    # =========================================================================
    server {
        listen 80;
        server_name localhost;
        root /var/www/backend/public;
        index index.php;

        # ---------------------------------------------------------------------
        # Security headers (AGENT.md Section 24.11)
        # ---------------------------------------------------------------------
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ---------------------------------------------------------------------
        # Hide server identity (AGENT.md Section 24.1)
        # ---------------------------------------------------------------------
        server_tokens off;
        more_clear_headers Server;

        # ---------------------------------------------------------------------
        # Deny access to hidden files (.env, .git, etc.)
        # ---------------------------------------------------------------------
        location ~ /\. {
            deny all;
            return 404;
        }

        # ---------------------------------------------------------------------
        # PHP Backend API — /api routes forwarded to PHP-FPM
        # ---------------------------------------------------------------------
        location /api {
            try_files $uri $uri/ /index.php?$query_string;

            location ~ \.php$ {
                fastcgi_pass   php:9000;
                fastcgi_index  index.php;
                fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
                include        fastcgi_params;
                fastcgi_param  DOCUMENT_ROOT $realpath_root;
                fastcgi_read_timeout 300;
                fastcgi_buffer_size 128k;
                fastcgi_buffers 4 256k;
                fastcgi_busy_buffers_size 256k;
            }
        }

        # ---------------------------------------------------------------------
        # PHP direct entry point
        # ---------------------------------------------------------------------
        location ~ \.php$ {
            fastcgi_pass   php:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include        fastcgi_params;
            fastcgi_param  DOCUMENT_ROOT $realpath_root;
            fastcgi_read_timeout 300;
        }

        # ---------------------------------------------------------------------
        # Website — Next.js public site (proxy to port 3000)
        # ---------------------------------------------------------------------
        location /website {
            rewrite ^/website(/.*)$ $1 break;
            proxy_pass         http://website:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            proxy_cache_bypass $http_upgrade;
        }

        # ---------------------------------------------------------------------
        # ERP — Next.js ERP dashboard (proxy to port 3001)
        # ---------------------------------------------------------------------
        location /erp {
            rewrite ^/erp(/.*)$ $1 break;
            proxy_pass         http://erp:3001;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            proxy_cache_bypass $http_upgrade;
        }

        # ---------------------------------------------------------------------
        # Next.js HMR WebSocket support (development hot reload)
        # ---------------------------------------------------------------------
        location /_next/webpack-hmr {
            proxy_pass         http://website:3000/_next/webpack-hmr;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # ---------------------------------------------------------------------
        # Health check endpoint
        # ---------------------------------------------------------------------
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ---------------------------------------------------------------------
        # Default — try static files, then PHP
        # ---------------------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }
    }
}