; =============================================================================
; T.N. Memorial Public School Digital Platform
; php/php.ini — PHP 8.3 Runtime Configuration
; Authority: .github/AGENT.md (Section 4.1 — Docker Governance)
; =============================================================================

; ---------------------------------------------------------------------------
; Core settings
; ---------------------------------------------------------------------------
[PHP]
engine                   = On
short_open_tag           = Off
precision                = 14
serialize_precision      = -1
output_buffering         = 4096
zlib.output_compression  = Off
implicit_flush           = Off
max_execution_time       = 300
max_input_time           = 300
memory_limit             = 256M

; ---------------------------------------------------------------------------
; Error reporting (production-safe — suppress display, enable logging)
; AGENT.md Section 12.6 — Error responses must not expose internal details
; ---------------------------------------------------------------------------
error_reporting          = E_ALL
display_errors           = Off
display_startup_errors   = Off
log_errors               = On
error_log                = /var/www/backend/logs/php_errors.log
html_errors              = Off
ignore_repeated_errors   = Off

; ---------------------------------------------------------------------------
; Security (AGENT.md Section 24.1)
; ---------------------------------------------------------------------------
expose_php               = Off
allow_url_fopen          = Off
allow_url_include        = Off
enable_dl                = Off

; ---------------------------------------------------------------------------
; File upload settings (AGENT.md Section 24.7)
; ---------------------------------------------------------------------------
file_uploads             = On
upload_max_filesize      = 64M
post_max_size            = 64M
max_file_uploads         = 20

; ---------------------------------------------------------------------------
; Session settings
; ---------------------------------------------------------------------------
[Session]
session.save_handler     = files
session.save_path        = /tmp
session.use_strict_mode  = 1
session.use_cookies      = 1
session.use_only_cookies = 1
session.name             = TNMSESSID
session.gc_maxlifetime   = 1440
session.cookie_httponly  = 1
session.cookie_samesite  = Lax
session.cookie_secure    = 0

; ---------------------------------------------------------------------------
; Date and timezone
; ---------------------------------------------------------------------------
[Date]
date.timezone            = UTC

; ---------------------------------------------------------------------------
; MySQLi
; ---------------------------------------------------------------------------
[MySQLi]
mysqli.max_persistent    = -1
mysqli.allow_persistent  = On
mysqli.reconnect         = Off

; ---------------------------------------------------------------------------
; PDO
; ---------------------------------------------------------------------------
[Pdo_mysql]
pdo_mysql.default_socket =

; ---------------------------------------------------------------------------
; OPcache (production performance)
; ---------------------------------------------------------------------------
[opcache]
opcache.enable                 = 1
opcache.enable_cli             = 0
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files  = 10000
opcache.revalidate_freq        = 0
opcache.validate_timestamps    = 1
opcache.fast_shutdown          = 1
opcache.enable_file_override   = Off

; ---------------------------------------------------------------------------
; Internationalization
; ---------------------------------------------------------------------------
[mbstring]
mbstring.language            = Neutral
mbstring.internal_encoding   = UTF-8
mbstring.http_output         = pass
mbstring.encoding_translation = Off
mbstring.detect_order        = auto
mbstring.substitute_character = none